name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest
    environment:
      name: release
      deployment: false
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build --fetch test

      - name: Build distribution binaries
        run: zig build dist -Doptimize=ReleaseSafe

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          mkdir -p artifacts

          for target_dir in zig-out/dist/*; do
            target="$(basename "$target_dir")"
            asset_base="actioneer-${version}-${target}"

            if [[ "$target" == *windows* ]]; then
              (cd "$target_dir" && zip -9 -r "../../../artifacts/${asset_base}.zip" .)
            else
              tar -C "$target_dir" -czf "artifacts/${asset_base}.tar.gz" .
            fi
          done

          (cd artifacts && shasum -a 256 * > "actioneer-${version}-checksums.txt")

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          args=(
            "$tag"
            artifacts/*
            --title "$tag"
            --generate-notes
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "${args[@]}"
          fi
