name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build-release:
    name: Build ${{ matrix.artifact_target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            artifact_target: x86_64-linux-musl
            binary_name: actioneer
            archive_ext: tar.gz
          - os: macos-13
            rust_target: x86_64-apple-darwin
            artifact_target: x86_64-macos
            binary_name: actioneer
            archive_ext: tar.gz
          - os: macos-14
            rust_target: aarch64-apple-darwin
            artifact_target: aarch64-macos
            binary_name: actioneer
            archive_ext: tar.gz
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_target: x86_64-windows
            binary_name: actioneer.exe
            archive_ext: zip
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install musl tools
        if: matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release -p actioneer --target ${{ matrix.rust_target }}

      - name: Package tarball
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          asset_base="actioneer-${version}-${{ matrix.artifact_target }}"
          bundle_dir="bundle/${asset_base}"
          binary_path="target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}"

          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir"
          cp LICENSE "$bundle_dir/"
          cp "$binary_path" "$bundle_dir/"
          mkdir -p artifacts
          tar -C bundle -czf "artifacts/${asset_base}.tar.gz" "${asset_base}"

      - name: Package zip
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $assetBase = "actioneer-$version-${{ matrix.artifact_target }}"
          $bundleDir = "bundle/$assetBase"
          $binaryPath = "target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}"
          Remove-Item $bundleDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $bundleDir | Out-Null
          Copy-Item LICENSE "$bundleDir/"
          Copy-Item $binaryPath "$bundleDir/"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Compress-Archive -Path "$bundleDir/*" -DestinationPath "artifacts/$assetBase.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.artifact_target }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-release
    environment:
      name: release
      deployment: false
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Write checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          (cd artifacts && shasum -a 256 * > "actioneer-${version}-checksums.txt")

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          args=(
            "$tag"
            artifacts/*
            --title "$tag"
            --generate-notes
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "${args[@]}"
          fi
