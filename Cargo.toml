[package]
name = "actioneer"
version = "0.2.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
description = "CLI that detects outdated GitHub Actions and updates them to the latest versions or pinned SHAs"
repository = "https://github.com/luxass/actioneer"
readme = "README.md"
keywords = ["github-actions", "cli", "security", "dependencies", "workflow"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "actioneer"
path = "src/lib.rs"

[[bin]]
name = "actioneer"
path = "src/main.rs"

[[test]]
name = "e2e"
path = "tests/e2e.rs"
required-features = ["e2e"]

[features]
e2e = []

[dependencies]
clap = { version = "4.6.1", features = ["derive", "env"] }
thiserror = "2.0.18"
owo-colors = "4.3.0"
crossterm = "0.29"
ratatui = "0.30"
reqwest = { version = "0.13", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = { package = "yaml_serde", version = "0.10" }
serde_json = "1"
time = { version = "0.3", features = ["parsing"] }
walkdir = "2"
yamlpath = "1.24.1"

[dev-dependencies]
tokio = { version = "1.52.2", features = ["macros", "rt-multi-thread"] }
wiremock = "0.6"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
dbg_macro = "warn"
todo = "warn"

[profile.release]
lto = true
strip = "symbols"
